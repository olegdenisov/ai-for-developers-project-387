name: Weekly documentation audit
on:
  schedule:
    - cron: "0 9 * * 1"  # Every Monday at 9am UTC
jobs:
  opencode:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode/minimax-m2.5-free
          prompt: |
            Compare the documentation (README.md, docs/) with the actual codebase.
            Look for: outdated API descriptions, broken code examples, references to renamed or deleted files.
            Create a PR fixing what you can, and an issue listing what needs human attention.