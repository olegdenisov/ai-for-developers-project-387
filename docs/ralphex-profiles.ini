# ralphex profiles
# Использование:
# 1. Выбери нужный профиль.
# 2. Скопируй соответствующий блок в ~/.config/ralphex/config или .ralphex/config.
# 3. При необходимости дополни своими путями, prompt'ами и локальными настройками.

# ------------------------------------------------------------------------------
# profile: cheap
# Минимальная стоимость и минимальный расход токенов.
# Подходит для рутинных задач, черновой реализации и быстрых прогонов.
# ------------------------------------------------------------------------------
task_model = sonnet:low
review_model = sonnet:low

external_review_tool = none

task_retry_count = 1
max_external_iterations = 0
review_patience = 0

finalize_enabled = false


# ------------------------------------------------------------------------------
# profile: balanced
# Базовый рабочий профиль с недорогим внешним review.
# Подходит для большинства повседневных задач.
# ------------------------------------------------------------------------------
# task_model = sonnet:medium
# review_model = sonnet:low
#
# external_review_tool = codex
# codex_model = gpt-5.3-codex-mini
# codex_reasoning_effort = low
# codex_sandbox = read-only
#
# task_retry_count = 1
# max_external_iterations = 1
# review_patience = 1
#
# finalize_enabled = false


# ------------------------------------------------------------------------------
# profile: strict
# Усиленный профиль для важных и рискованных изменений.
# Подходит для сложной логики, интеграций и задач, где цена ошибки высока.
# ------------------------------------------------------------------------------
# task_model = opus:high
# review_model = sonnet:medium
#
# external_review_tool = codex
# codex_model = gpt-5.4
# codex_reasoning_effort = high
# codex_sandbox = read-only
#
# task_retry_count = 2
# max_external_iterations = 2
# review_patience = 2
#
# finalize_enabled = true
